<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <title>Quota Peek</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>Quota Peek</h1>
      <span class="sub">AI coding plan usage</span>
    </div>
    <div class="controls">
      <span id="updated" class="updated"></span>
      <label class="auto">
        <input type="checkbox" id="auto" /> Auto (10m)
      </label>
      <button id="refresh">Refresh</button>
    </div>
  </header>

  <main>
    <div id="grid" class="grid">
      <div class="card placeholder">Loading…</div>
    </div>
  </main>

  <footer>
    <span>GET <code>/api/usage</code> · providers run live on every request</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
