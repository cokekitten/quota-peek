services:
  quota-peek:
    build: .
    image: quota-peek:latest
    container_name: quota-peek
    restart: unless-stopped
    ports:
      - "5928:5928"
    environment:
      GLM_API_KEY: ${GLM_API_KEY:?GLM_API_KEY is required — set it in .env or your shell}
      GLM_BASE_URL: https://open.bigmodel.cn
      CLAUDE_CREDENTIALS_PATH: /secrets/claude-creds.json
      CODEX_AUTH_PATH: /secrets/codex-auth.json
      GROK_AUTH_PATH: /secrets/grok-auth.json
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://www.minimaxi.com}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_CREDENTIALS_PATH: /secrets/kimi-creds.json
    volumes:
      - ${CLAUDE_CREDENTIALS:-~/.claude/.credentials.json}:/secrets/claude-creds.json:ro
      - ${CODEX_AUTH:-~/.codex/auth.json}:/secrets/codex-auth.json:ro
      - ${GROK_AUTH:-~/.grok/auth.json}:/secrets/grok-auth.json:ro
      # Mounted read-only: in Docker prefer KIMI_API_KEY, since OAuth tokens
      # last ~15 min and refresh write-back needs a writable file.
      - ${KIMI_CREDENTIALS:-~/.kimi-code/credentials/kimi-code.json}:/secrets/kimi-creds.json:ro
